# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

# м–ҙл–Ө BranchлқјлҸ„ мҪ”л“ңк°Җ pushлҗ  л•Ңл§ҲлӢӨ workflowк°Җ мӢӨн–үлҗҳлҸ„лЎқ н•Ё
on:
  push:
    branches:
      - "**"

# JobsлҘј нҶөн•ҙм„ң workflow лӢЁкі„ л§Ңл“Өм–ҙ мӨҖлӢӨ
jobs:
  build-bookmark-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookmarker-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # Maven Build мһ‘м—… мӢң мӢӨн–ү к¶Ңн•ң л¶Җм—¬
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw verify

      # Docker мқҙлҜём§Җ л№Ңл“ң л°Ҹ Push
      - name: Build and Push Image
        if: github.ref == 'refs/heads/main'
        run: |
          ./mvnw clean package jib:dockerBuild -DskipTests

          docker login \
            -u ${{ secrets.DOCKER_USERNAME }} \
            -p ${{ secrets.DOCKER_PASSWORD }}

          docker build \
            -t myimage:latest .

          docker tag myimage:latest \
            ${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest

          docker push \
            ${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest

#######################################################
#         bookmar-ui-nextjs л№Ңл“ң л°Ҹ docker л°°нҸ¬         #
#######################################################
  build-bookmarker-ui:
    name: Build bookmarker-ui
    runs-on: ubuntu-latest
    defaults:
      # л°°нҸ¬лҗң git repositoryмқҳ нҸҙлҚ”лӘ…
      run:
        working-directory: ./bookmark-ui-nextjs
    steps:
      #мҪ”л“ңмІҙнҒ¬м•„мӣғ
      - name: Checkout repository
        uses: actions/checkout@v5

      #Node.js м„Өм •
      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
      
      #мқҳмЎҙм„ұ м„Өм№ҳ
      - name: Install dependecies
        run: npm ci

      #Next.js л№Ңл“ң
      - name: Next.js Build
        run: npm run build
      
      #.env.local нҢҢмқј м„Өм •
      # ліөмӮ¬н•ҙм„ң мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ” мқҙмң лҠ” UIмқҳ .gitignore нҢҢмқјмқҖ .env* нҢҢмқјмқ„ м ңмҷё н•ңлӢӨ
      # нҢҢмқјмқ„ мһ‘м„ұн•ҙм„ң л„Јм–ҙ мӨҖлӢӨ echo л¬ём„ңлҘј л§Ңл“Өм–ҙ мӨҖлӢӨ
      - name: Create .env нҢҢмқј мғқм„ұ
        run: |
          echo "SERVER_SIDE_API_BASE_URL=${{ secrets.SERVER_SIDE_API_BASE_URL }}" > .env.local
          echo "NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL=${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL }}" >> .env.local

      # л©”мқё лёҢл Ңм№ҳ мқјкІҪмҡ° Docker мқҙлҜём§Җ л№Ңл“ң л°Ҹ л°°нҸ¬
      - if: ${{ github.ref == 'refs/heads/main' }}
        name: Build and Push Docker image
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -f Dockerfile.ui -t ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs .
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs

######################
# k8s л°°нҸ¬ job
# github actionм—җм„ң build => docker hub мҷ„лЈҢлҗң нӣ„м—җ serverм—җ мҡ”мІӯн•ҙм„ң ліҖкІҪлҗң мӮ¬н•ӯмқ„ k8sк°Җ kubectl лӘ…л №м–ҙлҘј нҶөн•ҙм„ң мғҲлЎң кі м№Ё (rollout)
#
# 1) Github Actionsм—җм„ң serverмқҳ SSHлЎң м ‘мҶҚ(кі„м •/л№„л°ҖлІҲнҳё - secret)
# 2) kubectl м„Өм • нҢҢмқј м§Җм •
# 3) лҰ¬мҶҢмҠӨ мқҪм–ҙмҷҖм•јн•Ё нҷ•мқё deploymentк°Җ мһҲлҠ” pods мқҙлҰ„мқҙ л§һлҠ”м§Җ
# 4) кё°мЎҙмқҳ PodлҘј мў…лЈҢ -> мғҲлЎңмҡҙ PodлҘј мғқм„ұ
# 5) мғҒнғңнҷ•мқё Podк°Җ м •мғҒ мғҒнғң лҗ  л•Ңк№Ңм§Җ лҢҖкё°
##
  deploy:
    name: Deploy to Server k8s
    runs-on: ubuntu-latest

    needs:
      - build-bookmark-api
      - build-bookmarker-ui

    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v0.1.7

        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |
            export KUBECONFIG=/home/ubuntu/.kube/config
            kubectl get nodes
            kubectl get pods
            kubectl apply -f /k8s

            echo "==== Deployment мһ¬мӢңмһ‘ ===="

            kubectl rollout restart deployment/bookmarker-api
            kubectl rollout restart deployment/bookmarker-ui-deployment
      
            echo "==== мғҲлЎңмҡҙ Pod мӢӨн–ү лҢҖкё° ===="
            kubectl rollout status deployment/bookmarker-api
            kubectl rollout status deployment/bookmarker-ui-deployment

            echo "==== k8s л°°нҸ¬ мҷ„лЈҢ ===="




