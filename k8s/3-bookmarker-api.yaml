apiVersion: apps/v1
kind: Deployment

metadata:
  name: bookmarker-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: bookmarker-api-pod

  template:
    metadata:
      labels:
        app: bookmarker-api-pod

    spec:
      containers:
      - name: bookmarker-api
        image: rin909/bookmarker-api:latest
        ports:
          - containerPort: 8080
        env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            # - name: DB_HOST
            #   valueFrom:
            #     configMapKeyRef:
            #       name: bookmarker-config
            #       key: postgres_host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postgres_port

            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postgres_dbname

            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postres_username

            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postres_password


