apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-SPRING_PROFILES_ACTIVE
spec:
  capacity:
    storage: 2Gi # 2기가 바이트
  accessModes:
    - ReadWriteOnce # ReadWriteOnce 한 노드에서 하나의 Pod만 읽기/쓰기
  storageClassName: standard
  hostPath:
    path: /data/db # 저장공간을 물리적인 위치 지정 kind에 docker-container 내부

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pv-PersistentVolumeClaim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-pod

  template:
    metadata:
      labels:
        app: postgres-pod

    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bookmarker-config
                  key: postgres_username

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookmarker-config
                  key: postgres_password

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postgres_dbname 

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pv-claim