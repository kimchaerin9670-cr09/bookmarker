apiVersion: v1
kind: PersistentVolume  # 종류 PV 사용

metadata:
  name: postgres-pv # postgres-pv 이름

spec:
  capacity:
    storage: 2Gi  # 2기가 바이트
  accessModes:
    - ReadWriteOnce   # ReadWriteOnce 한 노드에서 하나의 Pod만 읽기/쓰기
  storageClassName: standard
  hostPath:
    path: /data/db  # 저장 공간을 물리적인 위치 Kind에 docker-conatainer 내부

---

apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: postgres-pv-claim

spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi # PVC가 요청하는 용량이며, 바인딩되는 PV의 capacity보다 클 수 없다.
  storageClassName: standard

---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-pod



  template:
    metadata:
      labels:
        app: postgres-pod

    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bookmark-secrets
                  key: postgres_username

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookmark-secrets
                  key: postgres_password

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postgres_dbname
# kubectl create deployment postgres-deployment --image=postgres:14-alpine --port=5432 --dry-run=client -o yaml > 1-postgredb.yaml


          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pv-claim