apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-pod

  template:
    metadata:
      labels:
        app: postgres-pod

    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postres_username

            - name: POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef: 
                  name: bookmarker-confg
                  key: postres_password

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postres_dbname